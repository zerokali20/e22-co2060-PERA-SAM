version: '3.8'

services:
  backend:
    build:
      context: ../Model/server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../Model/server:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_ML_API_URL=http://localhost:8000
    depends_on:
      - backend
